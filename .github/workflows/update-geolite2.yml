name: Download MaxMind DB

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Download GeoLite2
        run: |
          curl -L -o GeoLite2-City.tar.gz \
          "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-City&license_key=${{ secrets.MAXMIND_LICENSE_KEY }}&suffix=tar.gz"

      - name: Extract
        run: tar -xzf GeoLite2-City.tar.gz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: geo-db
          path: .
